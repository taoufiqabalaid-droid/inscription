<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ISPITS Marrakech - Inscription</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box}
body{font-family:Segoe UI,sans-serif;background:#f4f7fa;margin:0}
header{background:#006699;color:#fff;text-align:center;padding:20px}
.container{max-width:1100px;margin:20px auto;background:#fff;padding:25px;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:15px}
@media(max-width:768px){.form-row{grid-template-columns:1fr}}
label{display:block;font-weight:bold;margin:8px 0}
input,select,textarea{width:100%;padding:10px;border:1px solid #ccc;border-radius:5px}
button{padding:12px 20px;border:none;border-radius:5px;cursor:pointer}
.btn-submit{background:#006699;color:#fff}
.btn-reset{background:#666;color:#fff}
.required:after{content:" *";color:red}
</style>
</head>
<body>
<header>
<h1>ISPITS Marrakech</h1>
<p>Année Académique 2025-2026</p>
</header>

<div class="container">
<form id="inscriptionForm">

<div class="form-row">
<div>
<label class="required">Nom</label>
<input type="text" name="nom" required>
</div>
<div>
<label class="required">Prénom</label>
<input type="text" name="prenom" required>
</div>
</div>

<div class="form-row">
<div>
<label class="required">CNI</label>
<input type="text" name="cni" required>
</div>
<div>
<label class="required">Date de naissance</label>
<input type="date" name="dateNaissance" required>
</div>
</div>

<div class="form-row">
<div>
<label class="required">Nationalité</label>
<input type="text" name="nationalite" required>
</div>
<div>
<label class="required">Email</label>
<input type="email" name="email" required>
</div>
</div>

<div class="form-row">
<div>
<label class="required">Filière</label>
<select name="filiere" required>
<option value="">Choisir</option>
<option>SI</option>
<option>SF</option>
<option>TS</option>
<option>RR</option>
<option>AMS</option>
</select>
</div>
<div>
<label class="required">Option</label>
<input type="text" name="option" required>
</div>
</div>

<label class="required">Modules</label>
<textarea name="modules" rows="4" required></textarea>

<br><br>

<button type="submit" class="btn-submit">Valider</button>
<button type="reset" class="btn-reset">Réinitialiser</button>
</form>
</div>

<script>
document.getElementById('inscriptionForm').addEventListener('submit',function(e){
e.preventDefault();

const data=Object.fromEntries(new FormData(this));
localStorage.setItem('derniere-inscription',JSON.stringify(data));

alert('Inscription enregistrée avec succès');

const {jsPDF}=window.jspdf;
const pdf=new jsPDF();
pdf.setFontSize(16);
pdf.text("FICHE DE VALIDATION D'INSCRIPTION",20,20);

let y=40;
Object.entries(data).forEach(([k,v])=>{
pdf.text(k+" : "+v,20,y);
y+=10;
});

pdf.save('fiche-validation.pdf');
});
</script>
</body>
</html>
