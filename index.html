<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Génération PDF</title>
    <!-- Importation de la librairie pour générer le PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 18px; }
        button:hover { background-color: #218838; }

        /* C'est ici que nous définissons le design du PDF à générer */
        #pdf-content {
            display: none; /* Caché à l'écran, servira uniquement pour le PDF */
            width: 595px; /* Largeur standard A4 en pixels (approx) */
            padding: 40px;
            font-family: 'Georgia', serif;
            color: #2c3e50;
            background: white;
            border: 5px solid #2c3e50;
        }

        .certificat-header { text-align: center; border-bottom: 2px solid #ddd; padding-bottom: 20px; margin-bottom: 20px; }
        .certificat-title { font-size: 32px; text-transform: uppercase; letter-spacing: 2px; color: #c0392b; }
        .certificat-body { font-size: 18px; line-height: 1.6; text-align: justify; }
        .signature { margin-top: 50px; text-align: right; border-top: 1px solid #333; padding-top: 10px; width: 200px; float: right; }
    </style>
</head>
<body>

<div class="container">
    <h2>Formulaire d'Inscription</h2>
    <form id="inscriptionForm">
        <div class="form-group">
            <label for="nom">Nom complet :</label>
            <input type="text" id="nom" placeholder="Entrez votre nom" required>
        </div>
        <div class="form-group">
            <label for="email">Email :</label>
            <input type="email" id="email" placeholder="email@exemple.com" required>
        </div>
        <div class="form-group">
            <label for="formation">Formation choisie :</label>
            <select id="formation">
                <option value="Développement Web">Développement Web</option>
                <option value="Marketing Digital">Marketing Digital</option>
                <option value="Design UI/UX">Design UI/UX</option>
            </select>
        </div>
        <button type="submit">Valider l'inscription & Télécharger PDF</button>
    </form>
</div>

<!-- Zone qui deviendra le PDF (cachée visuellement) -->
<div id="pdf-content">
    <div class="certificat-header">
        <div class="certificat-title">Reçu d'Inscription</div>
        <p>Date : <span id="pdf-date"></span></p>
    </div>
    <div class="certificat-body">
        <p>Nous avons bien reçu votre demande d'inscription.</p>
        <p><strong>Nom :</strong> <span id="pdf-nom"></span></p>
        <p><strong>Email :</strong> <span id="pdf-email"></span></p>
        <p><strong>Formation :</strong> <span id="pdf-formation"></span></p>
        <br>
        <p>Merci de votre confiance. Ce document vous servira de preuve.</p>
    </div>
    <div class="signature">
        Signature<br>
        (Direction)
    </div>
</div>

<script>
    document.getElementById('inscriptionForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Empêche le rechargement de la page

        // 1. Récupérer les valeurs du formulaire
        const nom = document.getElementById('nom').value;
        const email = document.getElementById('email').value;
        const formation = document.getElementById('formation').value;
        const date = new Date().toLocaleDateString('fr-FR');

        // 2. Remplir le contenu du PDF
        document.getElementById('pdf-nom').innerText = nom;
        document.getElementById('pdf-email').innerText = email;
        document.getElementById('pdf-formation').innerText = formation;
        document.getElementById('pdf-date').innerText = date;

        // 3. Configurer les options du PDF
        const element = document.getElementById('pdf-content');
        
        // On affiche temporairement pour que html2pdf puisse "cadrer" l'image
        element.style.display = 'block'; 

        const opt = {
            margin:       1,
            filename:     `inscription_${nom.replace(/\s/g, '_')}.pdf`, // Nom du fichier
            image:       { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF:       { unit: 'in', format: 'a4', orientation: 'portrait' }
        };

        // 4. Générer et télécharger
        html2pdf().set(opt).from(element).save().then(() => {
            // Cacher à nouveau après génération si besoin (optionnel ici car on recharge ou reset)
            element.style.display = 'none';
            alert("Inscription validée et PDF téléchargé !");
            document.getElementById('inscriptionForm').reset(); // Reset le formulaire
        });
    });
</script>

</body>
</html>
